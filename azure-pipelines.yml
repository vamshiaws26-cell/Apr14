# azure-pipelines.yml
# Place this file in the ROOT of your git repository

trigger:
  branches:
    include:
      - main        # runs when you push to main
      - develop     # also runs on develop branch

pool:
  name: Default   # free Microsoft-hosted agent

steps:

  # Step 1 - Install dependencies (Node.js example)
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: 'Install Node.js'

  - script: npm install
    displayName: 'Install dependencies'

  # Step 2 - Run tests
  - script: npm test
    displayName: 'Run tests'

  # Step 3 - Build the app
  - script: npm run build
    displayName: 'Build app'

  # Step 4 - Publish build output
  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: 'dist'       # your build output folder
      artifactName: 'drop'
    displayName: 'Publish artifact'
